name: Déploiement GitHub Pages et Vercel
on:
  push:
    branches:
      - main
jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Déployer sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./

  deploy-vercel:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Vercel CLI
        run: npm install -g vercel@51.8.0

      - name: Créer la configuration Vercel
        run: |
          mkdir -p .vercel
          echo '{"orgId":"${{ secrets.VERCEL_ORG_ID }}","projectId":"${{ secrets.VERCEL_PROJECT_ID }}"}' > .vercel/project.json

      - name: Déployer sur Vercel
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
